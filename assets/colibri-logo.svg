<!--
  ColibriX BI — Logo SVG Vectorial del Colibrí
  
  USO EN HTML:
    <img src="assets/colibri-logo.svg" alt="ColibriX BI" width="200" height="200" />
  
  O como inline SVG para poder animarlo con CSS:
    Copia el contenido del <svg> directamente en tu HTML
    y añade la clase "preloader__bird" para las animaciones.
  
  Colores personalizables via currentColor o CSS variables:
    - Cuerpo: #0D9488 (teal)
    - Alas:   white + #0D9488
    - Borde:  ninguno
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 200"
  width="200"
  height="200"
  role="img"
  aria-label="ColibriX BI — Colibrí logo"
>
  <title>ColibriX BI</title>
  <desc>Silueta minimalista de un colibrí en vuelo, logo de ColibriX BI</desc>

  <!-- Resplandor de fondo (opcional, quitar si se usa sobre fondo claro) -->
  <circle cx="100" cy="105" r="55" fill="rgba(13,148,136,0.08)" />

  <!-- Cuerpo principal -->
  <ellipse cx="105" cy="110" rx="28" ry="16" fill="#0D9488" />

  <!-- Cabeza -->
  <circle cx="128" cy="100" r="14" fill="#0D9488" />

  <!-- Pico -->
  <path d="M 140 100 L 178 97 L 140 103 Z" fill="#ffffff" opacity="0.9" />

  <!-- Cola -->
  <path d="M 78 112 L 55 125 L 70 108 L 55 95 L 78 108 Z" fill="#0D9488" opacity="0.8" />

  <!-- Ala superior -->
  <path
    class="bird-wing-top"
    d="M 110 108 C 105 80, 75 55, 55 60 C 75 75, 95 92, 110 108 Z"
    fill="#ffffff"
    opacity="0.85"
  />

  <!-- Ala inferior -->
  <path
    class="bird-wing-bottom"
    d="M 110 112 C 105 140, 75 155, 55 150 C 75 140, 95 128, 110 112 Z"
    fill="#0D9488"
    opacity="0.5"
  />

  <!-- Ojo -->
  <circle cx="133" cy="97" r="3" fill="#0B1325" />
  <circle cx="134" cy="96" r="1" fill="white" opacity="0.8" />

  <!-- Líneas de velocidad -->
  <line x1="60" y1="90" x2="38" y2="89" stroke="#0D9488" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
  <line x1="55" y1="100" x2="28" y2="100" stroke="#0D9488" stroke-width="1" opacity="0.3" stroke-linecap="round" />
  <line x1="60" y1="110" x2="38" y2="112" stroke="#0D9488" stroke-width="1.5" opacity="0.4" stroke-linecap="round" />
</svg>
